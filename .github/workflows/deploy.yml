name: Deploy

on:
  workflow_run:
    workflows: [Build Test]
    types: [completed]

jobs:
  on-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy UI
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.SERVICE_ID_UI }}
          api_key: ${{ secrets.RENDER_TOKEN }}
          wait_deploy: true

      - name: Deploy API
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.SERVICE_ID_API }}
          api_key: ${{ secrets.RENDER_TOKEN }}
          wait_deploy: true
